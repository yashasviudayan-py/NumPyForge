<svg width="1120" height="520" viewBox="0 0 1120 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NumPyForge architecture</title>
  <desc id="desc">A production-style flow from deterministic data to NumPy training, model artifacts, evaluation, FastAPI serving, and CI.</desc>
  <rect width="1120" height="520" fill="#0B1020"/>
  <rect x="28" y="28" width="1064" height="464" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="56" y="74" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">NumPyForge: From-Scratch ML to Production Loop</text>
  <text x="56" y="104" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Pure NumPy models, reproducible training, versioned artifacts, FastAPI serving, Docker, and CI.</text>

  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5.5L0 11Z" fill="#38BDF8"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="58" y="164" width="150" height="92" rx="12" fill="#1E293B" stroke="#64748B"/>
    <text x="82" y="199" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Ingest</text>
    <text x="82" y="225" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="13">deterministic</text>
    <text x="82" y="243" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="13">demo dataset</text>

    <rect x="268" y="164" width="170" height="92" rx="12" fill="#172554" stroke="#3B82F6"/>
    <text x="292" y="199" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Train</text>
    <text x="292" y="225" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="13">NumPy logistic</text>
    <text x="292" y="243" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="13">regression</text>

    <rect x="498" y="164" width="174" height="92" rx="12" fill="#052E2B" stroke="#14B8A6"/>
    <text x="522" y="199" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Artifact</text>
    <text x="522" y="225" fill="#99F6E4" font-family="Inter, Arial, sans-serif" font-size="13">model.npz</text>
    <text x="522" y="243" fill="#99F6E4" font-family="Inter, Arial, sans-serif" font-size="13">metadata + metrics</text>

    <rect x="732" y="104" width="166" height="92" rx="12" fill="#312E81" stroke="#818CF8"/>
    <text x="756" y="139" fill="#E0E7FF" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Evaluate</text>
    <text x="756" y="165" fill="#C7D2FE" font-family="Inter, Arial, sans-serif" font-size="13">JSON metrics</text>
    <text x="756" y="183" fill="#C7D2FE" font-family="Inter, Arial, sans-serif" font-size="13">ROC/PR reports</text>

    <rect x="732" y="224" width="166" height="92" rx="12" fill="#3B1A24" stroke="#FB7185"/>
    <text x="756" y="259" fill="#FFE4E6" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Serve</text>
    <text x="756" y="285" fill="#FECDD3" font-family="Inter, Arial, sans-serif" font-size="13">FastAPI health</text>
    <text x="756" y="303" fill="#FECDD3" font-family="Inter, Arial, sans-serif" font-size="13">ready + predict</text>

    <rect x="958" y="224" width="86" height="92" rx="12" fill="#422006" stroke="#F59E0B"/>
    <text x="978" y="259" fill="#FEF3C7" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Client</text>
    <text x="978" y="285" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="13">HTTP</text>
    <text x="978" y="303" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="13">JSON</text>
  </g>

  <path d="M208 210H258" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M438 210H488" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M672 190C704 176 705 154 724 150" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M672 230C704 244 705 266 724 270" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M898 270H948" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="252" y="348" width="614" height="74" rx="14" fill="#0F172A" stroke="#475569"/>
  <text x="280" y="378" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">GitHub Actions CI</text>
  <text x="280" y="403" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="13">Black, Ruff, mypy, coverage, pipeline smoke test, and Docker image build</text>

  <path d="M418 348C390 314 374 288 360 256" stroke="#22C55E" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <path d="M584 348C584 314 584 288 584 256" stroke="#22C55E" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <path d="M764 348C790 328 802 316 812 316" stroke="#22C55E" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrow)"/>

  <text x="56" y="454" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="13">Core idea: ML algorithms are inspectable from first principles, while the surrounding workflow looks like a production service.</text>
</svg>
